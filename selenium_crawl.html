<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>웹 크롤링 실습장 - 동적 데이터(Selenium)</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            line-height: 1.6;
            margin: 40px;
            color: #333;
        }

        .container {
            border: 1px solid #ddd;
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 8px;
        }

        .article-item {
            margin-bottom: 15px;
            border-bottom: 1px dashed #eee;
            padding-bottom: 15px;
            list-style: none;
        }

        .article-title {
            font-size: 1.2em;
            font-weight: bold;
            color: #0056b3;
        }

        .meta-info {
            font-size: 0.8em;
            color: #888;
            margin-top: 5px;
        }

        .btn-more {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #f1f3f5;
            border: 1px solid #dee2e6;
            color: #495057;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            border-radius: 4px;
            transition: background 0.3s;
        }

        .btn-more:hover {
            background-color: #e2e6ea;
        }

        .btn-more:disabled {
            background-color: #e9ecef;
            color: #adb5bd;
            cursor: not-allowed;
        }

        #loading {
            display: none;
            text-align: center;
            padding: 10px;
            color: #0056b3;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="header-area">
        <h1 id="main-title">Selenium 동적 크롤링 연습</h1>
        <p class="description">
            버튼을 클릭하여 <strong>자바스크립트가 데이터를 동적으로 불러오는 과정</strong>을 실습해 보세요.
        </p>
    </div>

    <div class="container" id="news-section">
        <h2>실시간 트렌드 뉴스</h2>

        <ul id="news-list" style="padding-left: 0;">
            <li class="article-item default-item">
                <div class="article-title">파이썬 웹 크롤링 핵심 가이드</div>
                <div class="meta-info">조회수: 1,024 | 2026-03-09</div>
            </li>
            <li class="article-item default-item">
                <div class="article-title">Pandas로 시작하는 데이터 전처리</div>
                <div class="meta-info">조회수: 856 | 2026-03-08</div>
            </li>
        </ul>

        <div id="loading">데이터를 불러오는 중입니다...</div>

        <button id="load-more-btn" class="btn-more">기사 더보기 (Click!)</button>
    </div>

    <script>
        // 추가될 가상의 기사 데이터
        const hiddenData = [
            { title: "Selenium을 활용한 버튼 자동 클릭 기법", views: "1,542", date: "2026-03-07" },
            { title: "BeautifulSoup vs Selenium: 언제 무엇을 쓸까?", views: "2,301", date: "2026-03-06" },
            { title: "데이터 분석가를 위한 필수 라이브러리 Top 5", views: "3,110", date: "2026-03-05" }
        ];

        let clickCount = 0;

        const btn = document.getElementById('load-more-btn');
        const loading = document.getElementById('loading');
        const list = document.getElementById('news-list');

        function disableButton() {
            btn.innerText = "더 이상 불러올 기사가 없습니다";
            btn.disabled = true;
            btn.style.display = "block";
        }

        // 처음부터 추가 기사 데이터가 없으면 바로 버튼 비활성화
        if (hiddenData.length === 0) {
            disableButton();
        }

        btn.addEventListener('click', function () {
            // 안전장치: 이미 더 불러올 데이터가 없으면 바로 비활성화
            if (clickCount >= hiddenData.length) {
                disableButton();
                return;
            }

            // 로딩 시작
            btn.style.display = 'none';
            loading.style.display = 'block';

            // 1.5초 후 새 기사 추가
            setTimeout(() => {
                const data = hiddenData[clickCount];

                const newItem = document.createElement('li');
                newItem.className = 'article-item dynamic-item';
                newItem.innerHTML = `
                    <div class="article-title" style="color: #d35400;">[New] ${data.title}</div>
                    <div class="meta-info">조회수: ${data.views} | ${data.date}</div>
                `;

                list.appendChild(newItem);
                clickCount++;

                // 로딩 종료
                loading.style.display = 'none';

                // 마지막 기사까지 다 불러왔으면 즉시 비활성화
                if (clickCount >= hiddenData.length) {
                    disableButton();
                } else {
                    btn.style.display = 'block';
                }
            }, 1500);
        });
    </script>

</body>
</html>
